name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          shellcheck install.sh
          shellcheck uninstall.sh
          shellcheck update.sh
          shellcheck wrapper/claude-resurrect.sh

  node-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check hook syntax
        run: node --check hooks/pre-compact.mjs

  ps-lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check PowerShell syntax
        shell: pwsh
        run: |
          $files = @(
            'install.ps1',
            'uninstall.ps1',
            'wrapper/claude-resurrect.ps1'
          )
          foreach ($f in $files) {
            $errors = $null
            $null = [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $f).Path, [ref]$null, [ref]$errors
            )
            if ($errors.Count -gt 0) {
              Write-Error "$f has syntax errors:`n$($errors | Out-String)"
              exit 1
            }
            Write-Host "ok $f"
          }
